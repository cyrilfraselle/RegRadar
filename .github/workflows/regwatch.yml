name: RegRadar — daily watch

# Quand le robot se déclenche
on:
  schedule:
    # Tous les jours à 06:00 UTC (= 08:00 heure de Bruxelles en été)
    - cron: '0 6 * * *'
  workflow_dispatch:   # + bouton "Run" manuel dans l'onglet Actions

# Permet au robot d'écrire dans le repo (pour pousser les nouvelles données)
permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère le code du repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Installe Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Installe les dépendances
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Lance le moteur (les secrets arrivent comme variables d'environnement)
      - name: Run regulatory watch
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
        run: python regulatory_watch.py --maintenant

      # 5. Pousse les données mises à jour sur le repo (le site se rafraîchit alors tout seul)
      - name: Commit updated data
        run: |
          git config user.name  "regradar-bot"
          git config user.email "actions@github.com"
          git add docs/data/items.json docs/data/meta.json trends.json seen.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Aucune nouvelle donnée à pousser."
          else
            git commit -m "Auto-update regulatory data [skip ci]"
            git push
          fi
