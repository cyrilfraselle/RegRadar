<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<script>
(function(){try{var t=localStorage.getItem('regradar-theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RegRadar — Read the Law</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --bg: #0E1117; --surface: #151A21; --surface-2: #1A2029; --border: #232B36;
    --border-strong: #2E3845; --text: #E6EDF3; --text-2: #9AA7B4; --text-3: #5E6B79;
    --accent: #6D8EE6; --accent-bg: #182236;
    --crit: #F0616D; --imp: #E3A008; --info: #5DA9E9; --ok: #2EBD85; --purple: #9D7BD8;
    --radius: 10px; --radius-sm: 6px;
    --font: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --mono: 'SF Mono',ui-monospace,Menlo,Consolas,monospace;
    --reading: 'Georgia','Times New Roman',serif;
  }
  html[data-theme="light"] {
    --bg: #F7F8FA; --surface: #FFFFFF; --surface-2: #F8FAFC; --border: #E6E9EF;
    --border-strong: #D5DAE2; --text: #16202C; --text-2: #5A6675; --text-3: #94A0AE;
    --accent: #2D5FCC; --accent-bg: #EDF2FD;
    --crit: #C13515; --imp: #B25E09; --info: #1E6FB8; --ok: #0F8A5F; --purple: #6B2D8B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 20px; }

  .topbar { position: sticky; top: 0; z-index: 50; background: var(--surface); border-bottom: 1px solid var(--border); }
  .topbar-inner { display: flex; align-items: center; gap: 16px; height: 56px; }
  .logo { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 15px; }
  .logo-mark { width: 28px; height: 28px; border-radius: 8px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; }
  .logo-sub { font-size: 11px; color: var(--text-3); font-weight: 400; }
  .nav { display: flex; gap: 2px; margin-left: 8px; }
  .nav a { padding: 6px 13px; border-radius: var(--radius-sm); font-size: 13px; color: var(--text-2); font-weight: 500; }
  .nav a.active { background: var(--accent-bg); color: var(--accent); }
  .nav a:hover:not(.active) { background: var(--surface-2); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .icon-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-2); color: var(--text-2); cursor: pointer; font-size: 15px; }

  .lib { padding: 28px 0 60px; }
  .lib h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .lib .sub { color: var(--text-2); font-size: 14px; margin-bottom: 24px; }
  .law-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 14px; }
  .law-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: border-color .12s; }
  .law-card:hover { border-color: var(--accent); }
  .law-card.soon { opacity: .55; cursor: default; }
  .law-card.soon:hover { border-color: var(--border); }
  .law-name { font-size: 18px; font-weight: 700; }
  .law-full { font-size: 12px; color: var(--text-2); margin: 4px 0 12px; line-height: 1.4; min-height: 32px; }
  .law-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pill { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: var(--surface-2); color: var(--purple); border: 1px solid var(--border); }
  .pill-celex { color: var(--text-3); font-family: var(--mono); }
  .badge-soon { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: var(--surface-2); color: var(--text-3); }

  .reader { display: none; grid-template-columns: 250px 1fr 250px; gap: 24px; padding: 24px 0 80px; }
  .reader.open { display: grid; }
  @media (max-width: 980px){ .reader { grid-template-columns: 1fr; } .toc-wrap, .aside-defs { display: none; } }

  .toc-wrap { position: sticky; top: 76px; align-self: start; max-height: calc(100vh - 96px); overflow-y: auto; }
  .toc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .toc-head h3 { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; }
  .toc-toggle-all { font-size: 10px; color: var(--text-3); cursor: pointer; background: none; border: none; }
  .toc-toggle-all:hover { color: var(--accent); }
  .toc-chapter { margin-bottom: 4px; }
  .toc-chapter-title { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--text-2); padding: 5px 0; cursor: pointer; user-select: none; }
  .toc-chapter-title:hover { color: var(--text); }
  .toc-caret { font-size: 9px; color: var(--text-3); transition: transform .15s; display: inline-block; width: 8px; }
  .toc-chapter.collapsed .toc-caret { transform: rotate(-90deg); }
  .toc-arts { overflow: hidden; }
  .toc-chapter.collapsed .toc-arts { display: none; }
  .toc-art { display: block; font-size: 12px; color: var(--text-3); padding: 3px 0 3px 16px; cursor: pointer; border-left: 1px solid var(--border); line-height: 1.35; }
  .toc-art:hover { color: var(--accent); border-left-color: var(--accent); }
  .toc-art.active { color: var(--accent); border-left-color: var(--accent); font-weight: 600; }

  .law-body { min-width: 0; }
  .back-link { font-size: 12px; color: var(--text-3); cursor: pointer; margin-bottom: 10px; display: inline-block; }
  .back-link:hover { color: var(--accent); }
  .law-header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 8px; }
  .law-header h1 { font-size: 23px; font-weight: 700; line-height: 1.25; }
  .law-header .ttl { font-size: 13px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }
  .law-header .meta { display: flex; gap: 10px; margin-top: 12px; align-items: center; flex-wrap: wrap; }

  .status-box { display: flex; margin-top: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .status-cell { flex: 1; padding: 10px 14px; border-right: 1px solid var(--border); }
  .status-cell:last-child { border-right: none; }
  .status-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; }
  .status-val { font-size: 13px; font-weight: 600; margin-top: 3px; font-family: var(--mono); }
  .status-val.applied { color: var(--ok); }
  .status-val.pending { color: var(--imp); }

  .lang-switch { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .lang-btn { padding: 6px 11px; font-size: 12px; font-weight: 600; color: var(--text-3); cursor: pointer; background: var(--surface-2); border: none; border-right: 1px solid var(--border); }
  .lang-btn:last-child { border-right: none; }
  .lang-btn.active { background: var(--accent); color: #fff; }
  .lang-btn.disabled { opacity: .4; cursor: not-allowed; }

  .eurlex-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text); }
  .eurlex-link:hover { border-color: var(--accent); color: var(--accent); }
  .reader-search { width: 100%; margin: 16px 0; padding: 9px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; outline: none; }
  .reader-search:focus { border-color: var(--accent); }

  .chapter-head { font-size: 11px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: .08em; margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); scroll-margin-top: 76px; }
  .article { padding: 16px 0; border-bottom: 1px solid var(--border); scroll-margin-top: 76px; }
  .article-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .article-num { font-size: 11px; font-weight: 700; color: var(--accent); font-family: var(--mono); }
  .article-link { font-size: 11px; color: var(--text-3); cursor: pointer; opacity: 0; transition: opacity .12s; }
  .article:hover .article-link { opacity: 1; }
  .article-link:hover { color: var(--accent); }
  .article h2 { font-size: 16px; font-weight: 600; margin: 3px 0 10px; }
  .article-text { font-family: var(--reading); font-size: 15px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
  .article-text .term { border-bottom: 1px dashed var(--accent); cursor: help; }
  .article-text .lawref { color: var(--accent); border-bottom: 1px solid var(--accent); cursor: pointer; }
  .article-refs { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .ref-label { font-size: 11px; color: var(--text-3); }
  .ref-chip { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--accent-bg); color: var(--accent); cursor: pointer; font-family: var(--mono); }

  .aside-defs { position: sticky; top: 76px; align-self: start; max-height: calc(100vh - 96px); overflow-y: auto; }
  .aside-defs h3 { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
  .def-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 8px; }
  .def-term { font-size: 13px; font-weight: 600; color: var(--purple); margin-bottom: 4px; }
  .def-text { font-size: 12px; color: var(--text-2); line-height: 1.5; }

  #tooltip { position: fixed; z-index: 200; max-width: 320px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 8px; padding: 11px 13px; font-size: 12px; line-height: 1.5; color: var(--text-2); box-shadow: 0 8px 30px rgba(0,0,0,.3); display: none; }
  #tooltip .tt-term { font-weight: 600; color: var(--purple); display: block; margin-bottom: 4px; font-size: 13px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border-strong); border-radius: 8px; padding: 10px 16px; font-size: 13px; box-shadow: 0 8px 30px rgba(0,0,0,.3); display: none; z-index: 210; }
  .loading { padding: 60px 20px; text-align: center; color: var(--text-3); }

.topbar .topbar-inner{max-width:1280px;}
  .law-sticky { position: sticky; top: 56px; z-index: 10; background: var(--bg); padding: 12px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .art-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 14px 0; }
  .art-nav-btn { font-size: 13px; padding: 8px 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; }
  .art-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .art-nav-btn:disabled { opacity: .4; cursor: not-allowed; }
  .art-nav-pos { font-size: 12px; color: var(--text-3); font-family: var(--mono); }
  .defs-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .defs-toggle { font-size: 10px; color: var(--text-3); background: none; border: none; cursor: pointer; }
  .defs-toggle:hover { color: var(--accent); }
  .defs-show { position: fixed; right: 0; top: 50%; transform: translateY(-50%) rotate(180deg); writing-mode: vertical-rl; background: var(--accent); color: #fff; border: none; padding: 12px 8px; border-radius: 8px 0 0 8px; cursor: pointer; font-size: 12px; font-weight: 600; z-index: 20; }
  .credit { text-align: center; font-size: 11px; color: var(--text-3); padding: 20px 0 40px; }
  .credit a { color: var(--text-2); text-decoration: underline; }
  .search-results { display: none; }
  .search-results.on { display: block; margin: 8px 0 4px; }
  .search-result { font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 5px; cursor: pointer; background: var(--surface); }
  .search-result:hover { border-color: var(--accent); }
  .search-result b { color: var(--accent); }
  .search-result .sr-snip { color: var(--text-3); font-size: 11px; margin-top: 2px; }
  .reader.defs-hidden { grid-template-columns: 240px 1fr; }
  .article-chapter { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap topbar-inner">
    <div class="logo"><span class="logo-mark">R</span> RegRadar <span class="logo-sub">· Belgium &amp; EU</span></div>
    <nav class="nav">
      <a href="index.html">Dashboard</a>
      <a href="obligations.html">Obligations</a>
      <a href="extractor.html">Extractor</a>
      <a class="active" href="#">Read the Law</a>
      <a href="country-risk.html">Country Risk</a>
    </nav>
    <div class="topbar-right"><button class="icon-btn" onclick="toggleTheme()">◐</button></div>
  </div>
</div>

<div class="wrap">
  <div class="lib" id="library">
    <h1>EU Regulatory Library</h1>
    <p class="sub">Read key EU financial regulations in a clean, structured viewer. Click a regulation to open it.</p>
    <div class="law-grid" id="lawGrid"><div class="loading">Loading library…</div></div>
  </div>

  <div class="reader" id="reader">
    <aside class="toc-wrap">
      <div class="toc-head"><h3>Contents</h3><button class="toc-toggle-all" onclick="toggleAllChapters()">collapse all</button></div>
      <div id="toc"></div>
    </aside>
    <div class="law-body">
      <div class="law-sticky" id="lawSticky">
        <span class="back-link" onclick="closeReader()">← Library</span>
        <div class="law-header" id="lawHeader"></div>
      </div>
      <input class="reader-search" id="readerSearch" placeholder="Search this regulation (jumps to matching articles)…" oninput="searchInLaw()" autocomplete="off">
      <div id="searchResults" class="search-results"></div>
      <div class="art-nav" id="artNavTop">
        <button class="art-nav-btn" id="prevBtnTop" onclick="navArticle(-1)">← Previous</button>
        <span class="art-nav-pos" id="artPosTop"></span>
        <button class="art-nav-btn" id="nextBtnTop" onclick="navArticle(1)">Next →</button>
      </div>
      <div id="articles"></div>
      <div class="art-nav" id="artNavBottom">
        <button class="art-nav-btn" onclick="navArticle(-1)">← Previous</button>
        <button class="art-nav-btn" onclick="navArticle(1)">Next →</button>
      </div>
    </div>
    <aside class="aside-defs" id="asideDefs">
      <div class="defs-head"><h3>Defined terms</h3><button class="defs-toggle" onclick="toggleDefs()">hide</button></div>
      <div id="defs"></div>
    </aside>
  </div>
  <button class="defs-show" id="defsShow" onclick="toggleDefs()" style="display:none">Defined terms ›</button>
</div>

<div class="credit">Reader design inspired by <a href="https://legalviz.eu/" target="_blank" rel="noopener">legalviz.eu</a></div>

<div id="tooltip"></div>
<div class="toast" id="toast"></div>

<script>
let LAW=null, DEFS=[], INDEX=[], allCollapsed=false, CURLANG='EN', CURCELEX=null, LANGS=['EN'];

async function loadLibrary(){
  try{
    INDEX = window.__EMBEDDED_LAW_INDEX__ || await fetch('data/laws/index.json').then(r=>r.json());
    document.getElementById('lawGrid').innerHTML = INDEX.map(l=>{
      const appliedDate = l.dates && l.dates.application ? `<span class="pill pill-celex">appl. ${l.dates.application}</span>` : '';
      if(l.available){
        return `<div class="law-card" onclick="openLaw('${l.celex}')">
          <div class="law-name">${esc(l.name)}</div>
          <div class="law-full">${esc(l.full_name)}</div>
          <div class="law-meta"><span class="pill">${esc(l.topic)}</span>${appliedDate}</div></div>`;
      }
      return `<div class="law-card soon">
        <div class="law-name">${esc(l.name)}</div>
        <div class="law-full">${esc(l.full_name)}</div>
        <div class="law-meta"><span class="pill">${esc(l.topic)}</span><span class="badge-soon">parse pending</span></div></div>`;
    }).join('');
    const params = new URLSearchParams(location.search);
    const celex = params.get('celex');
    if(celex){ await openLaw(celex, params.get('art'), params.get('lang')); }
  }catch(e){
    document.getElementById('lawGrid').innerHTML='<div class="loading">Could not load the library. Run the parser to generate law data.</div>';
  }
}

// Load a specific language file for a regulation. Falls back to base file, then EN.
async function fetchLaw(celex, lang){
  // Embedded mode (preview)
  if(window.__EMBEDDED_LAWS__){
    const key = `${celex}_${lang}`;
    return window.__EMBEDDED_LAWS__[key] || window.__EMBEDDED_LAWS__[celex] || null;
  }
  // Try language-specific file, then fall back
  const tries = [`data/laws/${celex}_${lang}.json`, `data/laws/${celex}_EN.json`, `data/laws/${celex}.json`];
  for(const url of tries){
    try{ const r = await fetch(url); if(r.ok) return await r.json(); }catch(e){}
  }
  return null;
}

async function openLaw(celex, jumpArt, lang){
  try{
    const entry = INDEX.find(l=>l.celex===celex);
    LANGS = (entry && entry.langs) || ['EN'];
    CURLANG = (lang && LANGS.includes(lang)) ? lang : 'EN';
    CURCELEX = celex;
    LAW = await fetchLaw(celex, CURLANG);
    if(!LAW){ showToast('Could not load this regulation.'); return; }
    DEFS = LAW.definitions || [];
    document.getElementById('library').style.display='none';
    document.getElementById('reader').classList.add('open');
    window.scrollTo(0,0);
    renderHeader(); renderTOC(); renderArticles(); renderDefs();
    try{ if(localStorage.getItem('regradar-defs-hidden')==='1' && !DEFS_HIDDEN) toggleDefs(); }catch(e){}
    history.replaceState(null,'',`?celex=${celex}${CURLANG!=='EN'?'&lang='+CURLANG:''}`);
    if(jumpArt) setTimeout(()=>jumpTo(jumpArt), 200);
  }catch(e){ showToast('Could not load this regulation.'); }
}

// Switch language while keeping the current article in view
async function switchLang(lang){
  if(lang===CURLANG || !LANGS.includes(lang) || !CURCELEX) return;
  const keep=CUR_ART;  // stay on the same article across languages
  CURLANG=lang;
  LAW = await fetchLaw(CURCELEX, lang);
  DEFS = LAW.definitions || [];
  CUR_ART=keep;
  renderHeader(); renderTOC(); renderArticles(); renderDefs();
  history.replaceState(null,'',`?celex=${CURCELEX}${lang!=='EN'?'&lang='+lang:''}`);
}
function closeReader(){
  document.getElementById('reader').classList.remove('open');
  document.getElementById('library').style.display='block';
  LAW=null; history.replaceState(null,'',location.pathname);
}

function fmtDate(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }

function renderHeader(){
  const d = LAW.dates||{};
  const now = new Date();
  const applVal = d.application ? fmtDate(d.application) : '—';
  const applCls = d.application ? (new Date(d.application) <= now ? 'applied' : 'pending') : '';
  const applNote = d.application ? (new Date(d.application) <= now ? ' ✓' : ' (upcoming)') : '';
  document.getElementById('lawHeader').innerHTML=`
    <h1>${esc(LAW.name)} — ${esc(LAW.full_name)}</h1>
    <div class="ttl">${esc(LAW.title)}</div>
    <div class="meta">
      <span class="pill">${esc(LAW.topic)}</span>
      <span class="pill pill-celex">CELEX ${LAW.celex}</span>
      <div class="lang-switch">
        ${['EN','FR','NL'].map(lg=>{
          const avail = LANGS.includes(lg);
          const active = lg===CURLANG ? 'active' : '';
          const dis = avail ? '' : 'disabled';
          const handler = avail ? `onclick="switchLang('${lg}')"` : `title="Not yet parsed in this language"`;
          return `<button class="lang-btn ${active} ${dis}" ${handler}>${lg}</button>`;
        }).join('')}
      </div>
      <a class="eurlex-link" href="${LAW.url}" target="_blank" rel="noopener">View on EUR-Lex ↗</a>
    </div>
    <div class="status-box">
      <div class="status-cell"><div class="status-label">Published</div><div class="status-val">${fmtDate(d.published)}</div></div>
      <div class="status-cell"><div class="status-label">Entry into force</div><div class="status-val">${fmtDate(d.entry_into_force)}</div></div>
      <div class="status-cell"><div class="status-label">Date of application</div><div class="status-val ${applCls}">${applVal}${applNote}</div></div>
    </div>`;
}

function renderTOC(){
  const chapters = LAW.chapters||[];
  const byId = Object.fromEntries((LAW.articles||[]).map(a=>[a.id,a]));
  let h='';
  if(chapters.length){
    chapters.forEach((ch,ci)=>{
      const arts=(ch.articles||[]).filter(aid=>byId[aid]);
      h+=`<div class="toc-chapter" id="tocch-${ci}">
        <div class="toc-chapter-title" onclick="toggleChapter(${ci})"><span class="toc-caret">▼</span> ${esc(ch.title)}</div>
        <div class="toc-arts">`;
      arts.forEach(aid=>h+=`<span class="toc-art" data-art="${aid}" onclick="jumpTo('${aid}')">Art. ${aid} — ${esc(byId[aid].title)}</span>`);
      h+=`</div></div>`;
    });
  } else {
    (LAW.articles||[]).forEach(a=>h+=`<span class="toc-art" data-art="${a.id}" onclick="jumpTo('${a.id}')">Art. ${a.id} — ${esc(a.title)}</span>`);
  }
  document.getElementById('toc').innerHTML=h;
}
function toggleChapter(ci){ document.getElementById('tocch-'+ci).classList.toggle('collapsed'); }
function toggleAllChapters(){
  allCollapsed=!allCollapsed;
  document.querySelectorAll('.toc-chapter').forEach(c=>c.classList.toggle('collapsed',allCollapsed));
  document.querySelector('.toc-toggle-all').textContent = allCollapsed?'expand all':'collapse all';
}

let CUR_ART = null;        // id of the currently displayed article
let ART_ORDER = [];        // flat ordered list of article ids

function buildArtOrder(){
  const chapters=LAW.chapters||[], arts=LAW.articles||[];
  const byId=Object.fromEntries(arts.map(a=>[a.id,a]));
  ART_ORDER=[];
  if(chapters.length){
    chapters.forEach(ch=>(ch.articles||[]).forEach(aid=>{ if(byId[aid]) ART_ORDER.push(aid); }));
    // include any orphans not in a chapter
    arts.forEach(a=>{ if(!ART_ORDER.includes(a.id)) ART_ORDER.push(a.id); });
  } else {
    ART_ORDER = arts.map(a=>a.id);
  }
}

function renderArticles(){
  buildArtOrder();
  // show first article by default (or keep current if still valid)
  const target = (CUR_ART && ART_ORDER.includes(CUR_ART)) ? CUR_ART : ART_ORDER[0];
  showArticle(target);
}

function showArticle(id){
  const a=(LAW.articles||[]).find(x=>x.id===id);
  if(!a){ return; }
  CUR_ART=id;
  const chapterOf = (LAW.chapters||[]).find(ch=>(ch.articles||[]).includes(id));
  const chapLine = chapterOf ? `<div class="article-chapter">${esc(chapterOf.title)}</div>` : '';
  document.getElementById('articles').innerHTML = `
    <div class="article" id="art-${a.id}">
      ${chapLine}
      <div class="article-head"><span class="article-num">ARTICLE ${a.id}</span><span class="article-link" onclick="copyArtLink('${a.id}')">🔗 copy link</span></div>
      <h2>${esc(a.title)}</h2>
      <div class="article-text">${renderText(a)}</div>
      ${(a.refs&&a.refs.length)?`<div class="article-refs"><span class="ref-label">Refers to:</span>${a.refs.map(r=>`<span class="ref-chip" onclick="jumpTo('${r}')">Art. ${r}</span>`).join('')}</div>`:''}
    </div>`;
  // update nav position + button states
  const idx=ART_ORDER.indexOf(id);
  const pos=`Article ${idx+1} of ${ART_ORDER.length}`;
  document.getElementById('artPosTop').textContent=pos;
  ['prevBtnTop'].forEach(b=>document.getElementById(b).disabled = idx<=0);
  ['nextBtnTop'].forEach(b=>document.getElementById(b).disabled = idx>=ART_ORDER.length-1);
  document.querySelectorAll('#artNavBottom .art-nav-btn')[0].disabled = idx<=0;
  document.querySelectorAll('#artNavBottom .art-nav-btn')[1].disabled = idx>=ART_ORDER.length-1;
  // highlight in TOC
  document.querySelectorAll('.toc-art').forEach(t=>t.classList.toggle('active',t.dataset.art===id));
  // expand the chapter containing this article in the TOC
  if(chapterOf){
    const ci=(LAW.chapters||[]).indexOf(chapterOf);
    const el=document.getElementById('tocch-'+ci);
    if(el) el.classList.remove('collapsed');
  }
  // scroll body to top of article
  document.querySelector('.law-body').scrollIntoView({behavior:'smooth',block:'start'});
}

function navArticle(dir){
  const idx=ART_ORDER.indexOf(CUR_ART);
  const next=idx+dir;
  if(next>=0 && next<ART_ORDER.length) showArticle(ART_ORDER[next]);
}

function renderText(a){
  let out=esc(a.text);
  (a.law_refs||[]).forEach(lr=>{
    const re=new RegExp(escapeReg(esc(lr.text)),'g');
    const inLib = INDEX.some(l=>l.celex===lr.celex && l.available);
    const handler = inLib ? `onclick=&quot;openLaw('${lr.celex}')&quot;` : `onclick=&quot;window.open('https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:${lr.celex}','_blank')&quot;`;
    out=out.replace(re,`<span class="lawref" ${handler.replace(/&quot;/g,'"')} title="${inLib?'Open in library':'Open on EUR-Lex'}">$&</span>`);
  });
  DEFS.forEach((d,i)=>{
    const re=new RegExp(`\\b(${escapeReg(d.term)})\\b`,'gi');
    out=out.replace(re,(m)=> m.includes('class=')?m:`<span class="term" data-def="${i}">${m}</span>`);
  });
  return out;
}

function renderDefs(){
  document.getElementById('defs').innerHTML = DEFS.length
    ? DEFS.map(d=>`<div class="def-card"><div class="def-term">${esc(d.term)}</div><div class="def-text">${esc(d.definition)}</div></div>`).join('')
    : '<div style="font-size:12px;color:var(--text-3)">No defined terms parsed.</div>';
}

function jumpTo(id){
  if(ART_ORDER.includes(id)){ showArticle(id); }
  clearSearch();
}
function copyArtLink(id){
  const url=`${location.origin}${location.pathname}?celex=${LAW.celex}&art=${id}`;
  navigator.clipboard.writeText(url).then(()=>showToast(`Link to Article ${id} copied`)).catch(()=>showToast('Copy failed'));
}

function searchInLaw(){
  const q=document.getElementById('readerSearch').value.toLowerCase().trim();
  const box=document.getElementById('searchResults');
  if(!q){ clearSearch(); return; }
  const hits=[];
  (LAW.articles||[]).forEach(a=>{
    const hay=(a.title+' '+a.text).toLowerCase();
    const pos=hay.indexOf(q);
    if(pos>=0){
      const snip=a.text.slice(Math.max(0,pos-30),pos+60).trim();
      hits.push({id:a.id,title:a.title,snip});
    }
  });
  box.className='search-results on';
  box.innerHTML = hits.length
    ? hits.slice(0,40).map(h=>`<div class="search-result" onclick="jumpTo('${h.id}')"><b>Art. ${h.id}</b> — ${esc(h.title)}<div class="sr-snip">…${esc(h.snip)}…</div></div>`).join('')
    : `<div class="search-result" style="cursor:default">No article matches “${esc(q)}”.</div>`;
}
function clearSearch(){
  const box=document.getElementById('searchResults');
  if(box){ box.className='search-results'; box.innerHTML=''; }
  const inp=document.getElementById('readerSearch'); if(inp) inp.value='';
}

let DEFS_HIDDEN=false;
function toggleDefs(){
  DEFS_HIDDEN=!DEFS_HIDDEN;
  document.getElementById('asideDefs').style.display = DEFS_HIDDEN?'none':'block';
  document.getElementById('defsShow').style.display = DEFS_HIDDEN?'block':'none';
  document.getElementById('reader').classList.toggle('defs-hidden',DEFS_HIDDEN);
  try{ localStorage.setItem('regradar-defs-hidden', DEFS_HIDDEN?'1':'0'); }catch(e){}
}

// keyboard arrows for prev/next
document.addEventListener('keydown',e=>{
  if(document.getElementById('reader').style.display==='none') return;
  if(e.target.tagName==='INPUT') return;
  if(e.key==='ArrowLeft') navArticle(-1);
  if(e.key==='ArrowRight') navArticle(1);
});

const tt=document.getElementById('tooltip');
document.addEventListener('mouseover',e=>{ const t=e.target.closest('.term'); if(t){ const d=DEFS[t.dataset.def]; if(d){ tt.innerHTML=`<span class="tt-term">${esc(d.term)}</span>${esc(d.definition)}`; tt.style.display='block'; posTT(e);}}});
document.addEventListener('mousemove',e=>{ if(tt.style.display==='block') posTT(e); });
document.addEventListener('mouseout',e=>{ if(e.target.closest('.term')) tt.style.display='none'; });
function posTT(e){ tt.style.left=Math.min(e.clientX+14,innerWidth-340)+'px'; tt.style.top=Math.min(e.clientY+14,innerHeight-120)+'px'; }

let toastT;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(toastT); toastT=setTimeout(()=>t.style.display='none',1800); }
function toggleTheme(){ const h=document.documentElement; const t=h.dataset.theme==='dark'?'light':'dark'; h.dataset.theme=t; try{localStorage.setItem('regradar-theme',t);}catch(e){} }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escapeReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

loadLibrary();
</script>
